version: '0.1'
description: Apache ActiveMQ is an open source message broker written in Java that
  supports multiple protocols and languages.
language: Java
ports:
  default: 61616
  ssl: 61617
category:
  default: messaging
  sub: message broker
  tags: java, open source
license: Open Source
platforms:
- Linux
- Windows
- MacOS
urls:
  website: https://activemq.apache.org/
  issues: https://issues.apache.org/jira/browse/AMQ
  documentation: https://activemq.apache.org/documentation.html
  support: https://activemq.apache.org/support.html
  source: https://github.com/apache/activemq
  license: https://www.apache.org/licenses/LICENSE-2.0
  download: https://activemq.apache.org/download.html
  icon: https://activemq.apache.org/images/activemq-logo.png
containers:
  upstream:
    name: activemq
    image: activemq
    version: latest
    ports:
    - 61616
    - 61617

version: '0.1'
description: Apache is a popular open-source web server software that is used to serve
  web pages to clients over the internet.
language: C
ports:
  default: 80
  ssl: 443
category:
  default: Web Server
  sub: HTTP Server
  tags: Apache, Web, Server
license: Open Source
platforms:
- Linux
- Windows
- MacOS
urls:
  website: https://httpd.apache.org/
  issues: https://httpd.apache.org/bug_report.html
  documentation: https://httpd.apache.org/docs/
  support: https://httpd.apache.org/support.html
  source: https://github.com/apache/httpd
  license: https://www.apache.org/licenses/LICENSE-2.0
  download: https://httpd.apache.org/download.cgi
containers:
  upstream:
    name: apache
    image: apache
    version: latest
    ports:
    - 80
    - 443

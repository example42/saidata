version: 0.1

directories:
  config:
    path: /etc/httpd
  conf:
    path: /etc/httpd/conf.d
  log:
    path: /var/log/httpd
  data:
    path: /var/www/html
  mods:
    path: /etc/httpd/conf.modules.d
  lib:
    path: /var/lib/httpd

files:
  config:
    path: /etc/httpd/conf/httpd.conf
  log:
    path: /var/log/httpd/access.log
  errorlog:
    path: /var/log/httpd/error.log
  pid:
    path: /var/run/httpd/httpd.pid

packages:
  main:
    name: httpd

services:
  main:
    name: httpd

processes:
  main:
    path: /usr/sbin/httpd
    owner: root
    group: root


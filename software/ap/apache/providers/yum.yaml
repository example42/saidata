version: '0.1'
directories:
  config:
    path: /etc/httpd/conf
  dotconf:
    path: /etc/httpd/conf.d
  log:
    path: /var/log/httpd
  data:
    path: /var/www/html
  lib:
    path: /usr/lib/httpd
files:
  config:
    path: /etc/httpd/conf/httpd.conf
  log:
    path: /var/log/httpd/access_log
  pid:
    path: /var/run/httpd/httpd.pid
packages:
  default:
    name: httpd
services:
  default:
    name: httpd
processes:
  default:
    path: /usr/sbin/httpd

version: '0.1'
directories:
  config:
    path: /etc/apache2
  dotconf:
    path: /etc/apache2/conf.d
  log:
    path: /var/log/apache2
  data:
    path: /var/www/html
  lib:
    path: /usr/lib/apache2
files:
  config:
    path: /etc/apache2/apache2.conf
  log:
    path: /var/log/apache2/error_log
  pid:
    path: /var/run/apache2.pid
packages:
  default:
    name: apache2
services:
  default:
    name: apache2
processes:
  default:
    path: /usr/sbin/apache2

version: '0.1'
description: Asterisk is an open source communication platform that allows users to
  make and receive phone calls over the internet.
ports:
  default: 5060
  ssl: 5061
category:
  default: VoIP
  sub: PBX
  tags: communication, telephony
license: Open Source
platforms:
- Linux
- Windows
- MacOS
urls:
  website: https://www.asterisk.org/
  issues: https://issues.asterisk.org/
  documentation: https://wiki.asterisk.org/wiki/display/AST/Home
  support: https://www.asterisk.org/support/
  source: https://github.com/asterisk/asterisk
  license: https://www.asterisk.org/community/licensing
  download: https://www.asterisk.org/downloads
containers:
  upstream:
    name: asterisk
    image: asterisk
    version: latest
    ports:
    - 5060
    - 5061

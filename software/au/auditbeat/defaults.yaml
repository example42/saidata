version: '0.1'
description: Auditbeat is an open source lightweight shipper for audit data. It is
  part of the Elastic Stack.
category:
  default: Security
  sub: Auditing
  tags: Elastic Stack, Logging, Monitoring
license: Open Source
platforms:
- Linux
- Windows
- MacOS
urls:
  website: https://www.elastic.co/beats/auditbeat
  issues: https://github.com/elastic/beats/issues
  documentation: https://www.elastic.co/guide/en/beats/auditbeat/current/index.html
  support: https://www.elastic.co/support/matrix#matrix_beats
  source: https://github.com/elastic/beats/tree/master/auditbeat
  license: https://github.com/elastic/beats/blob/master/LICENSE.txt
  download: https://www.elastic.co/downloads/beats/auditbeat
containers:
  upstream:
    name: auditbeat
    image: auditbeat
    version: latest

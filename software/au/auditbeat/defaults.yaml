version: '0.1'
urls:
  website: https://www.elastic.co/beats/auditbeat
  issues: https://github.com/elastic/beats/issues
  documentation: https://www.elastic.co/guide/en/beats/auditbeat/current/index.html
  support: https://www.elastic.co/support/matrix#matrix_beats
  source: https://github.com/elastic/beats/tree/master/auditbeat
  license: https://github.com/elastic/beats/blob/master/LICENSE.txt
containers:
  upstream:
    name: auditbeat

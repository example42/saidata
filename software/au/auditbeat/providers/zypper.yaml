version: '0.1'
directories:
  config:
    path: /etc/auditbeat
  dotconf:
    path: /etc/auditbeat/auditbeat.yml
  log:
    path: /var/log/auditbeat
  data:
    path: /var/lib/auditbeat
  lib:
    path: /usr/share/auditbeat
files:
  config:
    path: /etc/auditbeat/auditbeat.yml
  log:
    path: /var/log/auditbeat/auditbeat.log
  pid:
    path: /var/run/auditbeat.pid
packages:
  default:
    name: auditbeat
services:
  default:
    name: auditbeat
processes:
  default:
    path: /usr/bin/auditbeat

version: '0.1'
description: Autofs is a kernel-based automounter for Linux. It allows automatic mounting
  of file systems on demand when a file or directory is accessed.
category:
  default: File System
  sub: Mounting
  tags: Automounter
license: Open Source
platforms:
- Linux
urls:
  website: https://www.kernel.org/pub/linux/daemons/autofs/
  issues: https://github.com/autofs/autofs/issues
  documentation: https://www.kernel.org/doc/html/latest/filesystems/autofs.html
  support: https://www.kernel.org/doc/html/latest/filesystems/autofs.html#support
  source: https://github.com/autofs/autofs
  license: https://github.com/autofs/autofs/blob/master/COPYING
  download: https://www.kernel.org/pub/linux/daemons/autofs/
containers:
  upstream:
    name: autofs
    image: autofs
    version: latest

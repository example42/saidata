    path: /nix/store/...-awscli-.../etc/aws
  dotconf:
    path: /nix/store/...-awscli-.../etc/aws
  log:
    path: /nix/store/...-awscli-.../var/log/aws
  data:
    path: /nix/store/...-awscli-.../share/aws
  lib:
    path: /nix/store/...-awscli-.../lib

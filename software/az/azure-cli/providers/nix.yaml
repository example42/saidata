version: '0.1'
directories:
  config:
    path: /etc/azure-cli
  dotconf:
    path: /etc/azure-cli
  log:
    path: /var/log/azure-cli
  data:
    path: /var/lib/azure-cli
  lib:
    path: /usr/lib/azure-cli
files:
  config:
    path: /etc/azure-cli/azure-cli.conf
  log:
    path: /var/log/azure-cli/azure-cli.log
  pid:
    path: /var/run/azure-cli/azure-cli.pid
packages:
  default:
    name: azure-cli
services:
  default:
    name: azure-cli
processes:
  default:
    path: /usr/bin/azure-cli

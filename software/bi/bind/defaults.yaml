version: '0.1'
description: BIND (Berkeley Internet Name Domain) is an open source software that
  implements the Domain Name System (DNS) protocols for the Internet. It is a widely
  used DNS server and provides a robust and secure platform for managing DNS zones
  and records.
ports:
  default: 53
category:
  default: Networking
  sub: DNS
  tags: DNS server, DNS management
license: Open Source
platforms:
- Linux
- Windows
- MacOS
urls:
  website: https://www.isc.org/bind/
  issues: https://gitlab.isc.org/isc-projects/bind9/issues
  documentation: https://bind9.readthedocs.io/en/latest/
  support: https://www.isc.org/support/
  source: https://gitlab.isc.org/isc-projects/bind9
  license: https://gitlab.isc.org/isc-projects/bind9/-/blob/master/LICENSE
  download: https://www.isc.org/download/
containers:
  upstream:
    name: bind
    image: bind
    version: latest

version: '0.1'
description: Bolt is a task runner and orchestrator for distributed systems.
language: Ruby
ports:
  default: 22
  ssl: 443
category:
  default: DevOps
  sub: Automation
  tags: Task Runner, Orchestration
license: Open Source
platforms:
- Linux
- Windows
- MacOS
urls:
  website: https://puppet.com/docs/bolt/latest/bolt.html
  issues: https://github.com/puppetlabs/bolt/issues
  documentation: https://puppet.com/docs/bolt/latest/bolt.html
  support: https://puppet.com/support-services
  source: https://github.com/puppetlabs/bolt
  license: https://github.com/puppetlabs/bolt/blob/master/LICENSE
  download: https://puppet.com/download-bolt
  icon: https://puppet.com/wp-content/uploads/2019/03/Bolt-Logo-1.png
containers:
  upstream:
    name: bolt
    image: puppet/bolt
    version: latest

description: OpenStack Telemetry (Ceilometer) is a data collection service that provides
  the ability to normalise and transform data across all current OpenStack core components
  with work underway to support future OpenStack components. It is a highly scalable,
  fault-tolerant, and extensible tool for collecting and processing measurements in
  OpenStack.

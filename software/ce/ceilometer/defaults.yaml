version: '0.1'
description: Ceilometer is an open source telemetry and metering service for the OpenStack
  cloud computing platform.
ports:
  default: 8777
  ssl: 8778
category:
  default: Monitoring
  sub: Telemetry
  tags: OpenStack, Cloud Computing
license: Open Source
platforms:
- Linux
urls:
  website: https://docs.openstack.org/ceilometer/latest/
  issues: https://bugs.launchpad.net/ceilometer
  documentation: https://docs.openstack.org/ceilometer/latest/
  support: https://ask.openstack.org/en/questions/
  source: https://github.com/openstack/ceilometer
  license: https://github.com/openstack/ceilometer/blob/master/LICENSE
  download: https://pypi.org/project/ceilometer/
containers:
  upstream:
    name: ceilometer
    image: ceilometer
    version: latest
    ports:
    - 8777
    - 8778

version: '0.1'
urls:
  website: https://github.com/Chia-Network/clvm
  issues: https://github.com/Chia-Network/clvm/issues
  documentation: https://clvm.readthedocs.io/en/latest/
  source: https://github.com/Chia-Network/clvm
  license: https://github.com/Chia-Network/clvm/blob/master/LICENSE
containers:
  upstream:
    name: clvm
    image: docker.io/clvm/clvm
    version: latest
description: Clustered Logical Volume Manager (CLVM) is a tool for managing shared
  storage in a cluster environment. It allows multiple servers to access and manage
  the same storage volumes, providing high availability and scalability for storage
  resources.
language: Python
license: Open Source
platforms:
- Linux
- MacOS
category:
  default: Storage Management
  tags:
  - cluster
  - storage
  - high availability


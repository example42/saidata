version: '0.1'
description: collectd is a daemon which collects system performance statistics periodically
  and provides mechanisms to store the values in a variety of ways, for example in
  RRD files.
language: C
ports:
  default: 25826
  ssl: 25826
category:
  default: monitoring
  sub: system
  tags: performance, statistics, metrics
license: Open Source
platforms:
- Linux
- Windows
- MacOS
urls:
  website: https://collectd.org/
  issues: https://github.com/collectd/collectd/issues
  documentation: https://collectd.org/documentation.shtml
  support: https://collectd.org/support.shtml
  source: https://github.com/collectd/collectd
  license: https://github.com/collectd/collectd/blob/master/COPYING
  download: https://collectd.org/download.shtml
containers:
  upstream:
    name: collectd
    image: collectd
    version: latest

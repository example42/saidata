version: '0.1'
directories:
  config:
    path: /etc/consul
  dotconf:
    path: /etc/consul.d
  log:
    path: /var/log/consul
  data:
    path: /var/lib/consul
  lib:
    path: /var/lib/consul/lib
files:
  config:
    path: /etc/consul/consul.json
  log:
    path: /var/log/consul/consul.log
  pid:
    path: /var/run/consul.pid
packages:
  default:
    name: consul
services:
  default:
    name: consul
processes:
  default:
    path: /usr/bin/consul

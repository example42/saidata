version: '0.1'
description: Corosync is an open source cluster engine for implementing high availability
  and fault tolerance in distributed systems.
language: C
ports:
  default: 5405
  ssl: 5406
category:
  default: High Availability
  sub: Cluster Management
  tags:
  - cluster
  - fault tolerance
  - distributed systems
license: Open Source
platforms:
- Linux
urls:
  website: https://corosync.github.io/corosync/
  issues: https://github.com/corosync/corosync/issues
  documentation: https://corosync.github.io/corosync/docs/corosync-3.1.0/html/
  support: https://corosync.github.io/corosync/support/
  source: https://github.com/corosync/corosync
  license: https://github.com/corosync/corosync/blob/master/COPYING
  download: https://github.com/corosync/corosync/releases
containers:
  upstream:
    name: corosync
    image: corosync

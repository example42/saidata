version: '0.1'
urls:
  website: https://corosync.github.io/corosync/
  issues: https://github.com/corosync/corosync/issues
  documentation: https://corosync.github.io/corosync/docs/
  support: https://corosync.github.io/corosync/support/
  source: https://github.com/corosync/corosync
  license: https://github.com/corosync/corosync/blob/master/COPYING
containers:
  upstream:
    name: corosync
    image: corosync/corosync
    version: latest
description: Corosync is an open source software for implementing and managing high
  availability clusters. It provides communication and synchronization services between
  nodes in a cluster, ensuring that all nodes are aware of the current state of the
  cluster and can take appropriate actions in case of failures or changes.
language: C
license: Open Source
platforms:
- Linux
- Windows
- MacOS
category:
  default: Cluster Management
  tags:
  - cluster
  - high availability
  - synchronization


version: '0.1'
description: Crowdsec is an open-source, lightweight, and easy-to-use security solution
  designed to protect servers, services, containers, or virtual machines.
language: Go
ports:
  default: 6060
  ssl: 443
category:
  default: Security
  sub: Intrusion Detection
  tags: Firewall, Network Security
license: Open Source
platforms:
- Linux
urls:
  website: https://crowdsec.net/
  issues: https://github.com/crowdsecurity/crowdsec/issues
  documentation: https://docs.crowdsec.net/
  support: https://crowdsec.net/support/
  source: https://github.com/crowdsecurity/crowdsec
  license: https://github.com/crowdsecurity/crowdsec/blob/master/LICENSE
  download: https://hub.docker.com/r/crowdsec/crowdsec
containers:
  upstream:
    name: crowdsec
    image: crowdsec
    version: latest
    ports:
    - 6060
    - 443

version: '0.1'
directories:
  config:
    path: /etc/crowdsec/
  dotconf:
    path: /etc/crowdsec/
  log:
    path: /var/log/crowdsec/
  data:
    path: /var/lib/crowdsec/
  lib:
    path: /usr/lib/crowdsec/
files:
  config:
    path: /etc/crowdsec/config.yaml
  log:
    path: /var/log/crowdsec/crowdsec.log
  pid:
    path: /var/run/crowdsec.pid
packages:
  default:
    name: crowdsec
services:
  default:
    name: crowdsec
processes:
  default:
    path: /usr/bin/crowdsec

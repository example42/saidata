version: '0.1'
directories:
  config:
    path: /etc/dhcpd
  dotconf:
    path: /etc/dhcpd/dhcpd.conf
  log:
    path: /var/log/dhcpd
  data:
    path: /var/lib/dhcpd
  lib:
    path: /var/lib/dhcpd
files:

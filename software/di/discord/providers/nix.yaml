version: '0.1'
directories:
  config:
    path: /home/user/.config/discord
  dotconf:
    path: /home/user/.config/discord
  log:
    path: /home/user/.config/discord/logs
  data:
    path: /home/user/.config/discord/data
  lib:
    path: /home/user/.config/discord/lib
files:

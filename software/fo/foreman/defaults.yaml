    issues: https://projects.theforeman.org/projects/foreman/issues
    documentation: https://theforeman.org/manuals/2.4/index.html
    support: https://theforeman.org/support.html
    source: https://github.com/theforeman/foreman
    license: https://github.com/theforeman/foreman/blob/develop/LICENSE

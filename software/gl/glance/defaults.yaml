version: '0.1'
urls:
  website: https://docs.openstack.org/glance/latest/
  issues: https://bugs.launchpad.net/glance
  documentation: https://docs.openstack.org/glance/latest/
  support: https://ask.openstack.org/en/questions/
  source: https://github.com/openstack/glance
  license: https://www.apache.org/licenses/LICENSE-2.0
containers:
  upstream:
    name: glance
    image: openstack/glance
    version: latest
description: Glance is an open source web server written in Python. It is designed

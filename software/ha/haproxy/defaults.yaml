version: '0.1'
description: HAProxy is a high performance TCP/HTTP load balancer and proxy server
  for high availability environments.
language: C
ports:
  default: 80
  ssl: 443
category:
  default: Networking
  sub: Load Balancer
  tags:
  - proxy
  - load-balancer
  - tcp
  - http
  - reverse-proxy
license: Open Source
platforms:
- Linux
- Windows
- MacOS
urls:
  website: https://www.haproxy.org/
  issues: https://github.com/haproxy/haproxy/issues
  documentation: https://www.haproxy.org/download/2.8/doc/
  support: https://discourse.haproxy.org/
  source: https://github.com/haproxy/haproxy
  license: https://www.haproxy.org/download/2.8/doc/LICENSE
  download: https://www.haproxy.org/download/
  icon: https://www.haproxy.org/img/haproxy_logo.svg
containers:
  upstream:
    name: haproxy
    image: haproxy
    version: latest
    ports:
    - 80
    - 443

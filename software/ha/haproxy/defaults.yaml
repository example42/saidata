version: '0.1'
urls:
  haproxy:
    website: https://www.haproxy.org/
    issues: https://github.com/haproxy/haproxy/issues
    documentation: https://www.haproxy.org/documentation/
    support: https://www.haproxy.com/support/
    source: https://github.com/haproxy/haproxy
    license: https://www.haproxy.org/download/2.2/doc/LICENSE
    download: https://www.haproxy.org/download/
containers:

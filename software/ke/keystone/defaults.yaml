version: '0.1'
urls:
  website: https://www.openstack.org/software/releases/keystone
  issues: https://bugs.launchpad.net/keystone
  documentation: https://docs.openstack.org/keystone/latest/
  support: https://ask.openstack.org/en/questions/
  source: https://github.com/openstack/keystone
  license: Apache License 2.0
containers:

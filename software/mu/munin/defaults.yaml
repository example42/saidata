description: Munin is a networked resource monitoring tool that can help analyze resource
  trends and usage in a computer environment. It uses a client-server model where
  the server collects data and the clients display it in a variety of ways. It is
  designed to be very plug and play. A default installation provides a lot of graphs
  with almost no work.
language: Python

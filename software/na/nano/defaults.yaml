version: '0.1'
urls:
  website: https://www.nano-editor.org/
  issues: https://github.com/nanotech/jellybeans.vim/issues
  documentation: https://www.nano-editor.org/docs.php
  support: https://www.nano-editor.org/support.php
  source: https://github.com/nanotech/jellybeans.vim
  download: https://www.nano-editor.org/download.php
containers:
  upstream:
    name: nano
    image: docker.io/library/nano
    version: latest
description: Nano is a lightweight and fast web server written in Python. It is designed
  to be easy to use and highly customizable, making it a popular choice for hosting
  simple websites and web applications.
ports:
  default:
    port: 80
  ssl:
    port: 443
language: Python
license: Open Source
platforms:
- Linux
- MacOS
category:
  default: Web Server
  sub: HTTP Server
  tags:
  - web
  - server
  - http


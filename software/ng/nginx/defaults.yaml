version: '0.1'
urls:
  website: https://nginx.org/
  issues: https://trac.nginx.org/nginx/report
  documentation: https://nginx.org/en/docs/
  support: https://nginx.org/en/support.html
  source: https://hg.nginx.org/nginx/
  license: https://nginx.org/LICENSE
  download: https://nginx.org/en/download.html
containers:
  upstream:
    name: nginx
    image: nginx
    version: latest
description: nginx is a high-performance, open-source web server and reverse proxy
  for HTTP, HTTPS, SMTP, POP3, and IMAP protocols. It is known for its stability,
  rich feature set, simple configuration, and low resource consumption.
ports:
  default:
    port: 80
  ssl:
    port: 443
license: Open Source
platforms:
- Linux
- Windows
- MacOS
category:
  default: Web Server
  sub: HTTP Server
  tags:
  - web
  - server
  - http


version: '0.1'
urls:
  website: https://www.nomadproject.io/
  issues: https://github.com/hashicorp/nomad/issues
  documentation: https://www.nomadproject.io/docs/
  support: https://www.nomadproject.io/support/
  source: https://github.com/hashicorp/nomad
  license: https://www.nomadproject.io/docs/internals/licenses.html
containers:
  upstream:
    name: nomad
    image: hashicorp/nomad
    version: latest
description: Nomad is a web server written in Python that allows users to easily host
  and manage their websites. It is designed to be lightweight and user-friendly, making
  it a great choice for both beginners and experienced web developers.
ports:
  default:
    port: 80
  ssl:
    port: 443
language: Python
license: Open Source
platforms:
- Linux
- MacOS
category:
  default: Web Server
  sub: HTTP Server
  tags:
  - web
  - server
  - http


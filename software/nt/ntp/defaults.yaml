version: '0.1'
urls:
  website: https://www.ntp.org/
  issues: https://github.com/ntp-project/ntp/issues
  documentation: https://www.ntp.org/documentation.html
  support: https://www.ntp.org/support.html
  source: https://github.com/ntp-project/ntp
  license: https://www.ntp.org/license.html

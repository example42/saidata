version: '0.1'
urls:
  website: https://www.postfix.org/
  issues: https://www.postfix.org/bugs.html
  documentation: https://www.postfix.org/documentation.html
  support: https://www.postfix.org/support.html
  source: https://github.com/vdukhovni/postfix
  license: https://www.postfix.org/COPYRIGHT_LICENSE
  download: https://www.postfix.org/download.html
containers:
  upstream:
    name: postfix

  documentation: https://www.proftpd.org/docs/
  support: https://www.proftpd.org/support.html
  source: https://github.com/proftpd/proftpd
  license: https://www.proftpd.org/license.html
  download: https://www.proftpd.org/download.html
containers:
  upstream:

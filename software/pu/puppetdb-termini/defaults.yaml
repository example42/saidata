version: '0.1'
urls:
  website: https://puppet.com/docs/puppetdb/latest/
  issues: https://tickets.puppetlabs.com/browse/PDB
  documentation: https://puppet.com/docs/puppetdb/latest/
  support: https://puppet.com/support-services/customer-support
  source: https://github.com/puppetlabs/puppetdb
  license: https://github.com/puppetlabs/puppetdb/blob/master/LICENSE
containers:
  upstream:
    name: puppetdb-termini

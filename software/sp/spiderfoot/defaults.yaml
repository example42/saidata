description: SpiderFoot is an open source intelligence (OSINT) automation tool. It
  automates the process of gathering intelligence about a given target, which may
  be an IP address, domain name, hostname or network subnet. It gathers information
  from a variety of sources, including search engines, social media platforms, and
  public databases.

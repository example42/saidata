version: '0.1'
urls:
  website: https://www.squid-cache.org/
  issues: https://github.com/squid-cache/squid/issues
  documentation: https://wiki.squid-cache.org/
  support: https://www.squid-cache.org/Support/
  source: https://github.com/squid-cache/squid
  license: https://www.squid-cache.org/Doc/LICENSE
  download: https://www.squid-cache.org/Versions/
containers:
  upstream:
    name: squid
    image: squid
    version: latest
description: Squid is a caching and forwarding HTTP web proxy. It has a wide variety
  of uses, from speeding up a web server by caching repeated requests, to caching
  web, DNS and other computer network lookups for a group of people sharing network
  resources.
ports:
  default:
    port: 3128
language: C
license: Open Source
platforms:
- Linux
- Windows
- MacOS
category:
  default: Web Server
  sub: HTTP Proxy
  tags:
  - web
  - proxy
  - caching


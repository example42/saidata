version: '0.1'
urls:
  website: https://www.surfex.org/
  issues: https://github.com/surfex/surfex/issues
  documentation: https://www.surfex.org/documentation/
  support: https://www.surfex.org/support/
  source: https://github.com/surfex/surfex
  download: https://github.com/surfex/surfex/releases
containers:
  upstream:
    name: surfex
    image: surfex/surfex
    version: latest
description: Surfex is a lightweight and efficient web server written in Python. It
  is designed to handle high traffic and deliver fast response times. It supports
  both HTTP and HTTPS protocols and can be easily configured for various web applications.
ports:
  default:
    port: 80
  ssl:
    port: 443
language: Python
license: Open Source
platforms:
- Linux
- MacOS
category:
  default: Web Server
  sub: HTTP Server
  tags:
  - web
  - server
  - http


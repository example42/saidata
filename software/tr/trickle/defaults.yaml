version: '0.1'
urls:
  website: https://trickle.app/
  issues: https://github.com/mariusor/trickle/issues
  documentation: https://github.com/mariusor/trickle#readme
  source: https://github.com/mariusor/trickle
  license: MIT
  download: https://github.com/mariusor/trickle/releases
containers:
  upstream:
    name: trickle
    image: trickledocker/trickle

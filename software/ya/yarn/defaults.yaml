version: '0.1'
urls:
  website: https://yarnpkg.com/
  issues: https://github.com/yarnpkg/yarn/issues
  documentation: https://yarnpkg.com/getting-started
  support: https://yarnpkg.com/support
  source: https://github.com/yarnpkg/yarn
  license: https://github.com/yarnpkg/yarn/blob/master/LICENSE
  download: https://yarnpkg.com/getting-started/install
containers:
